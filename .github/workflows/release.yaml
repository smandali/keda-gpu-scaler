name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  IMAGE_REPO: ghcr.io/pmady/keda-gpu-scaler

jobs:
  # Reject tags that are not strict semver (vX.Y.Z) before doing any real work.
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        run: |
          if ! echo "${GITHUB_REF_NAME}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not valid semver (vX.Y.Z). Aborting release."
            exit 1
          fi

  # Build multi-arch images and push to GHCR on tag push.
  images:
    runs-on: ubuntu-latest
    needs: [validate-tag]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.ref_name }}
            ${{ env.IMAGE_REPO }}:latest

  # Build release binaries (amd64 + arm64) and publish a GitHub Release.
  release:
    runs-on: ubuntu-latest
    needs: [images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      # The scaler links NVIDIA's NVML (libnvidia-ml.so) at runtime, so the
      # binaries require CGO. They will only run on hosts that have the NVIDIA
      # driver (and therefore libnvidia-ml.so) installed.
      - name: Build release binaries
        run: |
          set -euo pipefail
          build() {
            local arch="$1" cc="$2"
            local out="dist/${arch}"
            mkdir -p "${out}"
            CGO_ENABLED=1 GOOS=linux GOARCH="${arch}" CC="${cc}" \
              go build -o "${out}/keda-gpu-scaler" ./cmd/keda-gpu-scaler/
            CGO_ENABLED=1 GOOS=linux GOARCH="${arch}" CC="${cc}" \
              go build -o "${out}/gpu-metrics" ./cmd/gpu-metrics/
            tar -czf "keda-gpu-scaler_${GITHUB_REF_NAME}_linux_${arch}.tar.gz" \
              -C "${out}" keda-gpu-scaler gpu-metrics
          }
          build amd64 gcc
          build arm64 aarch64-linux-gnu-gcc

      - name: Generate checksums
        run: |
          sha256sum keda-gpu-scaler_*_linux_*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release with changelog and binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            keda-gpu-scaler_*_linux_*.tar.gz \
            checksums.txt

  # Package the Helm chart and publish it as an OCI artifact to GHCR on tag push.
  # Chart and app versions are stamped from the release tag (vX.Y.Z -> X.Y.Z), so
  # the published chart version tracks the release rather than Chart.yaml's
  # in-repo development version.
  chart:
    runs-on: ubuntu-latest
    needs: [images]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Package chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/keda-gpu-scaler \
            --version "${version}" --app-version "${version}"

      - name: Log in to GHCR
        env:
          HELM_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${HELM_REGISTRY_TOKEN}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm push "keda-gpu-scaler-${version}.tgz" oci://ghcr.io/pmady/charts
